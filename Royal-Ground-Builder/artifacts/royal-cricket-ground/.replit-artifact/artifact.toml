kind = "web"
previewPath = "/"
title = "Royal Cricket Ground"
version = "1.0.0"
id = "artifacts/royal-cricket-ground"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19721

[services.development]
run = "pnpm --filter @workspace/royal-cricket-ground run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royal-cricket-ground", "run", "build" ]
publicDir = "artifacts/royal-cricket-ground/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19721"
BASE_PATH = "/"
